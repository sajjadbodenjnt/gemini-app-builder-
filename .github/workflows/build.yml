name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Android Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev mathicgb libgmp-dev zlib1g-dev libsqlite3-dev lld openjdk-17-jdk unzip zip
          pip install --upgrade pip
          pip install cython==0.29.36 buildozer gitpython

      - name: Run Buildozer Engine
        run: |
          buildozer init
          # অ্যান্ড্রয়েড এসডিকে লাইসেন্স এবং ইন্টারনেট পারমিশন অটো কনফিগার করা
          sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy,requests,urllib3,certifi/' buildozer.spec
          sed -i 's/#android.permissions =/android.permissions = INTERNET/' buildozer.spec
          sed -i 's/#android.api = 33/android.api = 34/' buildozer.spec
          
          buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-APK
          path: bin/*.apk
